<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CortexaOS</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              base:    '#0A0A0A',
              surface: '#141414',
              elevated:'#1E1E1E',
              overlay: '#252525',
              brand:   '#CD3D35',
              'brand-hover': '#E85550',
              'brand-deep':  '#A32D26',
              'border-subtle':  '#1A1A1A',
              'border-default': '#2A2A2A',
              'border-strong':  '#383838',
              'text-primary':   '#F2F2F2',
              'text-secondary': '#909090',
              'text-muted':     '#555555',
              'text-code':      '#E5C07B',
            },
            fontFamily: {
              sans:  ['Geist', 'Inter', 'system-ui', 'sans-serif'],
              mono:  ['"Geist Mono"', '"JetBrains Mono"', 'monospace'],
              display: ['Geist', 'Inter', 'system-ui', 'sans-serif'],
            },
            backgroundImage: {
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            }
          }
        }
      }
    </script>
    <style>
      * { box-sizing: border-box; }
      html { font-size: 110%; }
      body {
        background-color: #0A0A0A;
        color: #F2F2F2;
        font-family: 'Geist', 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #383838; }
      /* Pipeline horizontal scroll */
      .pipeline-scroll::-webkit-scrollbar { height: 4px; }
      .pipeline-scroll::-webkit-scrollbar-track { background: #0A0A0A; }
      .pipeline-scroll::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 2px; }
      /* Code / mono text */
      .font-mono { font-family: 'Geist Mono', 'JetBrains Mono', monospace; }
      /* Thin border utility */
      .border-subtle { border-color: #1A1A1A; }
      .border-default { border-color: #2A2A2A; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",

    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@radix-ui/react-slot": "https://esm.sh/@radix-ui/react-slot@^1.2.4",
    "class-variance-authority": "https://esm.sh/class-variance-authority@^0.7.1",
    "tailwind-merge": "https://esm.sh/tailwind-merge@^3.4.0",
    "clsx": "https://esm.sh/clsx@^2.1.1",
    "@radix-ui/react-label": "https://esm.sh/@radix-ui/react-label@^2.1.8"
  }
}
</script>

</head>
